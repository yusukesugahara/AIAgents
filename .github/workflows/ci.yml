name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: ai_agents
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_agents"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun --no-env-file install --frozen-lockfile
      - run: bun --no-env-file run typecheck
      - run: bun --no-env-file run lint
      - run: bun --no-env-file test
      - run: bun --no-env-file run db:migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ai_agents
      - run: bun --no-env-file run test:integration:database
      - run: bun --no-env-file run test:integration:docker
