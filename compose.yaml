services:
  migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: bun --no-env-file run --filter @ai-agents/database db:migrate
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/ai_agents
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: bun --no-env-file apps/api/src/index.ts
    ports:
      - "${API_HOST_PORT:-4000}:4000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/ai_agents
      - APP_PORT=4000
      - APP_ENV=${APP_ENV:-development}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:4000/auth/google/callback}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    command: bun --no-env-file apps/worker/src/index.ts
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/ai_agents
      - APP_ENV=${APP_ENV:-development}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:4000/auth/google/callback}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_ANALYSIS_MODEL=${OPENAI_ANALYSIS_MODEL:-}
      - OPENAI_REPLY_MODEL=${OPENAI_REPLY_MODEL:-}
      - GMAIL_POLL_INTERVAL_SECONDS=${GMAIL_POLL_INTERVAL_SECONDS:-300}
      - GMAIL_POLL_MAX_RESULTS=${GMAIL_POLL_MAX_RESULTS:-50}
      - GMAIL_LOOKBACK_QUERY=${GMAIL_LOOKBACK_QUERY:-in:inbox newer_than:1d}
    depends_on:
      migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_agents
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d ai_agents"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  postgres_data:
